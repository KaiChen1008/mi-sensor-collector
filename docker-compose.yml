services:
  backend:
    build: ./backend
    ports:
      - "8002:8002"
    volumes:
      - ./backend/data:/app/data
    env_file:
      - ./backend/.env
    # BLE only works on Linux with host networking + Bluetooth device access.
    # For development or any non-Linux host, use SIMULATE_SENSORS=true in .env.

  frontend:
    build: ./frontend
    ports:
      - "8001:80"
    depends_on:
      - backend

  # Optional HomeKit bridge — start with: docker compose --profile homekit up
  homekit:
    build: ./backend
    command: python -m app.services.homekit_bridge
    ports:
      - "51826:51826"
      - "51826:51826/udp"
    volumes:
      - ./backend/data:/app/data
    env_file:
      - ./backend/.env
    environment:
      - API_BASE_URL=http://backend:8002
    depends_on:
      - backend
    profiles:
      - homekit
