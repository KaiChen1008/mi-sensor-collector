services:
  backend:
    build: ./backend
    ports:
      - "8002:8002"
    volumes:
      - ./backend/data:/app/data
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Docker on macOS/Windows has no BLE — simulate by default.
      # Override with: SIMULATE_SENSORS=false docker compose ... (Linux only; see docker-compose.ble.yml)
      - SIMULATE_SENSORS=${SIMULATE_SENSORS:-true}

  frontend:
    build: ./frontend
    ports:
      - "8001:80"
    depends_on:
      - backend

  # Optional HomeKit bridge — start with: docker compose --profile homekit up
  homekit:
    build: ./backend
    command: python -m app.services.homekit_bridge
    ports:
      - "51826:51826"
      - "51826:51826/udp"
    volumes:
      - ./backend/data:/app/data
    env_file:
      - ./backend/.env
    environment:
      - API_BASE_URL=http://backend:8002
    depends_on:
      - backend
    profiles:
      - homekit
